<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 88 88">
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #f0f0f0; }
      .fg { stroke: #1a1a1a; fill: none; }
      .acc { fill: #4a7fb5; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #2a2a2a; }
      .fg { stroke: #e0e0e0; fill: none; }
      .acc { fill: #7b9ec4; }
    }
  </style>
  <rect width="88" height="88" rx="16" class="bg"/>
  <text x="16" y="56" font-family="monospace" font-size="32" font-weight="600" class="acc">&gt;</text>
  <line x1="40" y1="56" x2="58" y2="56" stroke-width="3" stroke-linecap="round" class="fg"/>
</svg>
